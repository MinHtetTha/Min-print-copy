<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Copy & Print Order System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #ff6600; --secondary: #2c3e50; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pyidaungsu', sans-serif; }
        body { background: var(--bg); color: #333; }

        header { background: var(--primary); color: white; text-align: center; padding: 30px 10px; border-radius: 0 0 25px 25px; }

        .container { max-width: 500px; margin: auto; padding: 15px; }
        section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { font-size: 1.1rem; color: var(--primary); margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }

        /* ပစ္စည်းပြကွက် */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-card { border: 1px solid #eee; padding: 10px; border-radius: 10px; text-align: center; }
        .item-card i { font-size: 2rem; color: #555; margin-bottom: 5px; }
        .item-card.color i { color: var(--primary); }
        .price { font-weight: bold; display: block; color: var(--primary); }

        /* Order Form */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .order-no { background: #e9ecef; font-weight: bold; color: var(--secondary); }

        .btn-order { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        /* Payment QR */
        .qr-area { display: flex; gap: 10px; justify-content: center; }
        .qr-box { text-align: center; font-size: 0.8rem; }
        .qr-box img { width: 100px; height: 100px; border: 1px solid #ddd; margin-top: 5px; }

        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<header>
    <h1>Min Copy & Print</h1>
    <p>စိတ်တိုင်းကျ Print ထုတ်ပေးပါသည်</p>
</header>

<div class="container">
    <section>
        <h2><i class="fas fa-tags"></i> ဝန်ဆောင်မှုများ</h2>
        <div class="item-grid">
            <div class="item-card">
                <i class="fas fa-file-alt"></i>
                <span>A4 အမည်း</span>
                <span class="price">၁၀၀ ကျပ်</span>
            </div>
            <div class="item-card color">
                <i class="fas fa-file-image"></i>
                <span>A4 ကာလာ</span>
                <span class="price">၃၀၀ ကျပ်</span>
            </div>
            <div class="item-card">
                <i class="fas fa-copy"></i>
                <span>မိတ္တူ (A4)</span>
                <span class="price">၁၀၀ ကျပ်</span>
            </div>
            <div class="item-card color">
                <i class="fas fa-images"></i>
                <span>ဓာတ်ပုံ (4x6)</span>
                <span class="price">၅၀၀ ကျပ်</span>
            </div>
        </div>
    </section>

    <section>
        <h2><i class="fas fa-shopping-cart"></i> Order တင်ရန်</h2>
        <form id="orderForm">
            <div class="form-group">
                <label>Order နံပါတ် (Auto)</label>
                <input type="text" id="orderNo" class="order-no" readonly>
            </div>
            <div class="form-group">
                <label>အမျိုးအမည် ရွေးပါ</label>
                <select id="itemType" required>
                    <option value="A4 အမည်း">A4 အမည်း (၁၀၀ ကျပ်)</option>
                    <option value="A4 ကာလာ">A4 ကာလာ (၃၀၀ ကျပ်)</option>
                    <option value="မိတ္တူ">မိတ္တူ (၁၀၀ ကျပ်)</option>
                    <option value="ဓာတ်ပုံ 4x6">ဓာတ်ပုံ 4x6 (၅၀၀ ကျပ်)</option>
                </select>
            </div>
            <div class="form-group">
                <label>အရေအတွက်</label>
                <input type="number" id="qty" value="1" min="1" required>
            </div>
            <div class="form-group">
                <label>မှာကြားလိုသည့် အသေးစိတ် (ဥပမာ-စာအုပ်ချုပ်ရန်)</label>
                <textarea id="note" rows="3" placeholder="ဘာလုပ်ပေးရမလဲ ရေးပေးပါ..."></textarea>
            </div>
            <button type="submit" class="btn-order">Telegram မှ အော်ဒါတင်မည်</button>
        </form>
    </section>

    <section>
        <h2><i class="fas fa-university"></i> ငွေပေးချေရန် (09964563388)</h2>
        <div class="qr-area">
            <div class="qr-box"><strong>KPay QR</strong><br><img src="kpay-qr.jpg"></div>
            <div class="qr-box"><strong>Wave QR</strong><br><img src="wave-qr.jpg"></div>
        </div>
    </section>
</div>

<footer>&copy; 2026 Min Copy & Print | 09964563388</footer>

<script>
    // Order Number အလိုအလျောက် ထုတ်ပေးခြင်း (ဥပမာ- MIN-1234)
    const orderNo = "MIN-" + Math.floor(1000 + Math.random() * 9000);
    document.getElementById('orderNo').value = orderNo;

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        
        const type = document.getElementById('itemType').value;
        const qty = document.getElementById('qty').value;
        const note = document.getElementById('note').value;
        const no = document.getElementById('orderNo').value;

        // Message တည်ဆောက်ခြင်း
        const message = `Order No: ${no}%0Aအမျိုးအမည်: ${type}%0Aအရေအတွက်: ${qty}%0Aအသေးစိတ်: ${note}`;
        
        // Telegram သို့ ပို့ရန် (သင့်ဖုန်းနံပါတ်သို့ တိုက်ရိုက်)
        const telegramUrl = `https://t.me/+959964563388?text=${message}`;
        
        window.open(telegramUrl, '_blank');
    };
</script>

</body>
</html>
